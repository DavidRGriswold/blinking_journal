<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal dang it!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="blinking">Journal!</h1>
        <div class="imgbox">
            <img id="face" src="face.jpg">
        </div>
    </div>
    
    <audio controls id="sound" src="journal.m4a"></audio>
    <script>
        setInterval( () => {
            console.log("playing");
            let sound = document.getElementById("sound");
            let face = document.getElementById("face");
            sound.play();
            face.classList.remove("go");
            face.offsetWidth;
            face.classList.add("go");
        }, 90000);
    </script>
</body>
</html>
